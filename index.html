<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Consulta Empenhos - DICOM IF Baiano</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #1a5c37; border-bottom: 3px solid #27ae60; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        input:focus { border-color: #27ae60; outline: none; }
        button { background-color: #27ae60; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:hover { background-color: #219150; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; }
        th, td { padding: 10px; border: 1px solid #eee; text-align: left; }
        th { background: #27ae60; color: white; }
        #status { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; }
        .loading { background: #e3f2fd; color: #0d47a1; }
        .error { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔎 Localizador de Empenhos</h2>
    
    <div class="form-group">
        <label>Sua API Key:</label>
        <input type="password" id="apiKey" placeholder="Cole sua chave aqui...">
    </div>

    <div class="form-group">
        <label>CNPJ do Fornecedor:</label>
        <input type="text" id="cnpjInput" placeholder="00.000.000/0000-00" maxlength="18">
    </div>

    <button onclick="consultarPortal()">Consultar Portal da Transparência</button>

    <div id="status"></div>

    <table id="tabelaDados">
        <thead>
            <tr>
                <th>Data</th>
                <th>Documento</th>
                <th>Valor (R$)</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>
</div>

<script>
    const inputCnpj = document.getElementById('cnpjInput');

    // MÁSCARA CORRIGIDA
    inputCnpj.addEventListener('input', (e) => {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,3})(\d{0,3})(\d{0,4})(\d{0,2})/);
        e.target.value = !x[2] ? x[1] : x[1] + '.' + x[2] + (x[3] ? '.' + x[3] : '') + (x[4] ? '/' + x[4] : '') + (x[5] ? '-' + x[5] : '');
    });

    async function consultarPortal() {
        const rawCnpj = inputCnpj.value.replace(/\D/g, ''); 
        const key = document.getElementById('apiKey').value;
        const status = document.getElementById('status');
        const tabela = document.getElementById('tabelaDados');
        const corpo = document.getElementById('corpoTabela');

        if (!key) return msg("Insira a API Key.", "error");
        if (rawCnpj.length < 14) return msg("CNPJ incompleto.", "error");

        msg("⏳ Consultando...", "loading");
        tabela.style.display = "none";
        corpo.innerHTML = "";

        // Lembre-se: O proxy cors-anywhere é necessário para rodar via navegador
        const proxy = 'https://cors-anywhere.herokuapp.com/';
        const url = `https://api.portaldatransparencia.gov.br/api-de-dados/despesas/documentos-por-favorecido?codigoBeneficiario=${rawCnpj}&pagina=1`;

        try {
            const response = await fetch(proxy + url, {
                method: 'GET',
                headers: { 'chave-api-dados': key, 'Accept': 'application/json' }
            });

            if (!response.ok) throw new Error("Erro na chave ou no Portal.");

            const dados = await response.json();
            if (dados.length === 0) {
                msg("Nenhum registro encontrado.", "loading");
                return;
            }

            dados.forEach(item => {
                corpo.innerHTML += `<tr>
                    <td>${item.dataEmissao}</td>
                    <td>${item.documento}</td>
                    <td>${parseFloat(item.valor).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}</td>
                </tr>`;
            });

            status.style.display = "none";
            tabela.style.display = "table";

        } catch (err) {
            msg(`Erro: ${err.message}`, "error");
        }
    }

    function msg(m, t) {
        const s = document.getElementById('status');
        s.innerHTML = m;
        s.className = t;
        s.style.display = "block";
    }
</script>

</body>
</html>
