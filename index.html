<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Aquisições DICOM - IF Baiano</title>
    <style>
        :root { --verde-if: #27ae60; --dark: #2c3e50; --bg: #f4f7f6; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            margin: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .card { 
            max-width: 450px; 
            width: 90%;
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            text-align: center; 
            border-bottom: 10px solid var(--verde-if); 
        }
        h2 { color: var(--dark); margin-top: 0; font-size: 1.5em; }
        p { color: #666; font-size: 0.95em; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 25px; text-align: left; }
        label { font-weight: 600; display: block; margin-bottom: 10px; color: var(--dark); }
        
        input { 
            width: 100%; 
            padding: 18px; 
            border: 2px solid #e0e0e0; 
            border-radius: 12px; 
            font-size: 20px; 
            box-sizing: border-box; 
            text-align: center; 
            font-weight: bold; 
            color: var(--verde-if);
            transition: 0.3s;
        }
        input:focus { border-color: var(--verde-if); outline: none; background: #f9fffb; }
        
        .btn { 
            background: var(--verde-if); 
            color: white; 
            padding: 18px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 18px; 
            font-weight: bold; 
            transition: 0.3s; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn:hover { background: #219150; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(39, 174, 96, 0.3); }
        .btn:active { transform: translateY(0); }

        .footer { margin-top: 40px; color: #999; font-size: 0.8em; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 50px; margin-bottom: 10px;">🔍</div>
    <h2>Consulta de Empenhos</h2>
    <p>Acesse os dados oficiais do Portal da Transparência para o fornecedor desejado.</p>
    
    <div class="input-group">
        <label>CNPJ do Fornecedor:</label>
        <input type="text" id="cnpjInput" placeholder="00.000.000/0000-00" maxlength="18">
    </div>

    <button onclick="gerarLink()" class="btn">
        <span>Acessar Portal Oficial</span>
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
    </button>
</div>

<div class="footer">
    IF Baiano - DICOM | <strong>Versão: 2.1 (URL Direct Engine)</strong>
</div>

<script>
    const cnpjInput = document.getElementById('cnpjInput');

    // Máscara CNPJ (Apenas visual para o usuário)
    cnpjInput.addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length > 14) v = v.slice(0, 14);
        v = v.replace(/^(\d{2})(\d)/, '$1.$2');
        v = v.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
        v = v.replace(/\.(\d{3})(\d)/, '.$1/$2');
        v = v.replace(/(\d{4})(\d)/, '$1-$2');
        e.target.value = v;
    });

    function gerarLink() {
        const cnpjFormatado = cnpjInput.value;

        if (cnpjFormatado.length < 18) {
            alert("⚠️ Por favor, digite o CNPJ completo com 14 dígitos.");
            return;
        }

        // Encodamos o CNPJ (Ex: 34.239.740/0001-05 vira 34.239.740%2F0001-05)
        const cnpjEncoded = encodeURIComponent(cnpjFormatado);

        // Link Final baseado na estrutura real que você validou
        const urlFinal = `https://portaldatransparencia.gov.br/despesas/recursos-recebidos?paginacaoSimples=true&tamanhoPagina=&offset=&direcaoOrdenacao=asc&cpfCnpj=${cnpjEncoded}&colunasSelecionadas=linkDetalhamento%2CmesAno%2Cfavorecido%2CtipoFavorecido%2CufFavorecido%2CmunicipioFavorecido%2CvalorRecebido`;

        // Abre o Portal da Transparência em uma nova aba
        window.open(urlFinal, '_blank');
    }
</script>

</body>
</html>
