<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Empenhos DICOM - IF Baiano</title>
    <style>
        :root { --verde-if: #27ae60; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; }
        .card { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: var(--verde-if); border-left: 5px solid var(--verde-if); padding-left: 15px; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--dark); }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--verde-if); outline: none; }
        button { background: var(--verde-if); color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #219150; transform: translateY(-2px); }
        #status { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-weight: 500; }
        .loading { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; display: none; border-radius: 8px; overflow: hidden; }
        th, td { padding: 14px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: var(--verde-if); color: white; text-transform: uppercase; font-size: 12px; }
        tr:hover { background: #f9f9f9; }
    </style>
</head>
<body>

<div class="card">
    <h2>🔎 Consulta de Empenhos - Portal da Transparência</h2>
    
    <div class="input-group">
        <label>Chave da API (Token):</label>
        <input type="password" id="apiKey" placeholder="Insira seu token do Portal da Transparência">
    </div>

    <div class="input-group">
        <label>CNPJ do Fornecedor:</label>
        <input type="text" id="cnpjInput" placeholder="00.000.000/0000-00" maxlength="18">
    </div>

    <button onclick="buscarDados()">Realizar Consulta</button>

    <div id="status"></div>

    <table id="tabela">
        <thead>
            <tr>
                <th>Data</th>
                <th>Empenho</th>
                <th>Órgão/Unidade</th>
                <th>Valor Bruto</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>
</div>

<script>
    const cnpjInput = document.getElementById('cnpjInput');

    // Máscara de CNPJ Profissional
    cnpjInput.addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length > 14) v = v.slice(0, 14);
        v = v.replace(/^(\d{2})(\d)/, '$1.$2');
        v = v.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
        v = v.replace(/\.(\d{3})(\d)/, '.$1/$2');
        v = v.replace(/(\d{4})(\d)/, '$1-$2');
        e.target.value = v;
    });

    async function buscarDados() {
        const key = document.getElementById('apiKey').value.trim();
        const cnpj = cnpjInput.value.replace(/\D/g, '');
        const status = document.getElementById('status');
        const tabela = document.getElementById('tabela');
        const corpo = document.getElementById('corpoTabela');

        if (!key || cnpj.length < 14) {
            exibirStatus("Preencha a chave e o CNPJ corretamente.", "error");
            return;
        }

        exibirStatus("⏳ Consultando API do Governo... Aguarde.", "loading");
        tabela.style.display = "none";
        corpo.innerHTML = "";

        // URL da API com proxy para evitar 403 CORS no GitHub Pages
        // Nota: Se o cors-anywhere falhar, você pode usar o nó do n8n como webhook para ser seu proxy pessoal.
        const url = `https://cors-anywhere.herokuapp.com/https://api.portaldatransparencia.gov.br/api-de-dados/despesas/documentos-por-favorecido?codigoBeneficiario=${cnpj}&pagina=1`;

        try {
            const response = await fetch(url, {
                method: 'GET',
                headers: {
                    'chave-api-dados': key,
                    'Accept': 'application/json'
                }
            });

            if (response.status === 403) {
                throw new Error("Acesso Bloqueado (403). Você precisa autorizar o proxy em: https://cors-anywhere.herokuapp.com/corsdemo");
            }

            if (!response.ok) throw new Error(`Erro na API: Código ${response.status}`);

            const dados = await response.json();

            if (!dados || dados.length === 0) {
                exibirStatus("Nenhum empenho encontrado para este CNPJ.", "loading");
                return;
            }

            dados.forEach(item => {
                const valor = parseFloat(item.valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                corpo.innerHTML += `
                    <tr>
                        <td>${item.dataEmissao}</td>
                        <td>${item.documento}</td>
                        <td>${item.orgaoSuperior.nome}</td>
                        <td>${valor}</td>
                    </tr>`;
            });

            status.style.display = "none";
            tabela.style.display = "table";

        } catch (err) {
            exibirStatus(`⚠️ ${err.message}`, "error");
        }
    }

    function exibirStatus(msg, classe) {
        status.innerHTML = msg;
        status.className = classe;
        status.style.display = "block";
    }
</script>
</body>
</html>
