<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Aquisições DICOM - IF Baiano</title>
    <style>
        :root { --verde-if: #27ae60; --dark: #2c3e50; --bg: #f4f7f6; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            margin: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .card { 
            max-width: 450px; 
            width: 90%;
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            text-align: center; 
            border-top: 10px solid var(--verde-if); 
        }
        h2 { color: var(--dark); margin-top: 0; font-size: 1.5em; }
        p { color: #666; font-size: 0.95em; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 25px; text-align: left; }
        label { font-weight: 600; display: block; margin-bottom: 10px; color: var(--dark); }
        
        input { 
            width: 100%; 
            padding: 18px; 
            border: 2px solid #e0e0e0; 
            border-radius: 12px; 
            font-size: 20px; 
            box-sizing: border-box; 
            text-align: center; 
            font-weight: bold; 
            color: var(--verde-if);
            transition: 0.3s;
        }
        input:focus { border-color: var(--verde-if); outline: none; background: #f9fffb; }
        
        .btn { 
            background: var(--verde-if); 
            color: white; 
            padding: 18px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 18px; 
            font-weight: bold; 
            transition: 0.3s; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn:hover { background: #219150; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(39, 174, 96, 0.3); }
        
        .info-data {
            margin-top: 15px;
            font-size: 0.85em;
            color: #888;
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .footer { margin-top: 40px; color: #999; font-size: 0.8em; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 50px; margin-bottom: 10px;">🔎</div>
    <h2>Consulta de Empenhos</h2>
    <p>Acesse o Portal da Transparência com filtros automáticos de período.</p>
    
    <div class="input-group">
        <label>CNPJ do Fornecedor:</label>
        <input type="text" id="cnpjInput" placeholder="00.000.000/0000-00" maxlength="18">
    </div>

    <button onclick="gerarLink()" class="btn">
        <span>Acessar no Portal</span>
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
    </button>

    <div class="info-data" id="periodoInfo">
        Configurando parâmetros...
    </div>
</div>

<div class="footer">
    IF Baiano - DICOM | <strong>Versão: 2.4 (Portal URL Sync)</strong>
</div>

<script>
    const cnpjInput = document.getElementById('cnpjInput');
    const infoData = document.getElementById('periodoInfo');

    // Função para calcular o período dinâmico (Últimos 12 meses cheios)
    function obterPeriodo() {
        const hoje = new Date();
        const anoAtual = hoje.getFullYear();
        const mesAtual = hoje.getMonth(); // 0 a 11

        // Data Inicial: Primeiro dia do mês atual no ano anterior
        // Ex: Se hoje é 06/04/2026, início é 01/04/2025
        const dI = "01";
        const mI = String(mesAtual + 1).padStart(2, '0');
        const aI = anoAtual - 1;

        // Data Final: Último dia do mês atual no ano atual
        // Para simplificar e cobrir o mês todo: usamos o dia 30 ou 31
        // O portal aceita datas futuras no mês corrente para fechar o filtro
        const dF = "30"; 
        const mF = String(mesAtual + 1).padStart(2, '0');
        const aF = anoAtual;

        return {
            exibicao: `01/${mI}/${aI} até ${dF}/${mF}/${aF}`,
            de: `01/${mI}/${aI}`,
            ate: `${dF}/${mF}/${aF}`
        };
    }

    const periodo = obterPeriodo();
    infoData.innerHTML = `📅 Período: <strong>${periodo.exibicao}</strong>`;

    // Máscara CNPJ
    cnpjInput.addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length > 14) v = v.slice(0, 14);
        v = v.replace(/^(\d{2})(\d)/, '$1.$2');
        v = v.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
        v = v.replace(/\.(\d{3})(\d)/, '.$1/$2');
        v = v.replace(/(\d{4})(\d)/, '$1-$2');
        e.target.value = v;
    });

    function gerarLink() {
        const cnpjFormatado = cnpjInput.value;

        if (cnpjFormatado.length < 18) {
            alert("⚠️ Por favor, preencha o CNPJ corretamente.");
            return;
        }

        // Encodando os parâmetros exatamente como o Portal exige
        const cnpjEncoded = encodeURIComponent(cnpjFormatado);
        const deEncoded = encodeURIComponent(periodo.de);
        const ateEncoded = encodeURIComponent(periodo.ate);

        // URL Sincronizada com o link real do Portal
        const urlFinal = `https://portaldatransparencia.gov.br/despesas/recursos-recebidos?paginacaoSimples=true&tamanhoPagina=&offset=&direcaoOrdenacao=asc&de=${deEncoded}&ate=${ateEncoded}&cpfCnpj=${cnpjEncoded}&colunasSelecionadas=linkDetalhamento%2CmesAno%2Cfavorecido%2CtipoFavorecido%2CufFavorecido%2CmunicipioFavorecido%2CvalorRecebido`;

        window.open(urlFinal, '_blank');
    }
</script>

</body>
</html>
